<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Qwen3-VL</title>
<style>
  :root {
    --bg: #0f1115; --panel: #181b22; --panel2: #1f232c; --border: #2a2f3a;
    --text: #e6e8ee; --muted: #8a92a3; --accent: #4c8dff; --accent2: #6ea8ff;
    --reason: #b39ddb; --ok: #4ade80; --err: #f87171;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  .wrap { display: grid; grid-template-columns: 420px 1fr; height: 100vh; }

  .left { border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--panel); }
  .left header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .left header h1 { margin: 0; font-size: 15px; font-weight: 600; }
  .left header .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .left-body { padding: 12px 16px; overflow-y: auto; flex: 1; }
  .field { margin-bottom: 12px; }
  .field > label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
  select, input[type="number"] {
    width: 100%; background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 8px; font: inherit;
  }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }

  .drop {
    border: 1.5px dashed var(--border); border-radius: 8px; padding: 18px; text-align: center;
    color: var(--muted); cursor: pointer; transition: .15s; background: var(--panel2);
  }
  .drop:hover { border-color: var(--accent); color: var(--text); }
  .drop.drag { border-color: var(--accent); background: rgba(76,141,255,.08); }
  .drop .big { font-size: 22px; margin-bottom: 4px; }
  #fileInput { display: none; }
  .previews { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .preview { position: relative; width: 64px; height: 64px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
  .preview img { width: 100%; height: 100%; object-fit: cover; }
  .preview .x { position: absolute; top: 1px; right: 2px; background: rgba(0,0,0,.7); color: #fff; border-radius: 3px; cursor: pointer; font-size: 11px; line-height: 1; padding: 2px 3px; }

  textarea#prompt {
    width: 100%; min-height: 96px; resize: vertical; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; font: inherit;
  }
  textarea#prompt:focus { outline: none; border-color: var(--accent); }

  .send {
    width: 100%; padding: 10px; border: none; border-radius: 8px; background: var(--accent);
    color: #fff; font: 600 14px inherit; cursor: pointer; transition: .15s;
  }
  .send:hover { background: var(--accent2); }
  .send:disabled { background: var(--border); cursor: not-allowed; }
  .send.stop { background: var(--err); }
  .left-footer { padding: 10px 16px; border-top: 1px solid var(--border); }

  .right { display: flex; flex-direction: column; overflow: hidden; }
  .right header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .right header .title { font-weight: 600; font-size: 14px; }
  .status { font-size: 12px; color: var(--muted); margin-left: auto; }
  .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--muted); margin-right: 5px; vertical-align: middle; }
  .status.live .dot { background: var(--ok); animation: pulse 1s infinite; }
  .status.err .dot { background: var(--err); }
  @keyframes pulse { 50% { opacity: .4; } }

  .panes { flex: 1; display: grid; grid-template-columns: 1fr 1fr 1.3fr; overflow: hidden; }
  .pane { display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .pane + .pane { border-left: 1px solid var(--border); }
  .pane-head { padding: 8px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--panel); display: flex; align-items: center; }
  .pane-head .pill { margin-left: auto; font-size: 10px; background: var(--panel2); padding: 1px 6px; border-radius: 10px; color: var(--muted); }
  .pane-body { padding: 14px 16px; overflow-y: auto; flex: 1; white-space: pre-wrap; word-break: break-word; font-size: 13px; }
  .pane.reason .pane-head { color: var(--reason); }
  .pane-body:empty::before { content: attr(data-placeholder); color: var(--muted); font-style: italic; }
  .cursor { display: inline-block; width: 7px; height: 14px; background: var(--accent); vertical-align: text-bottom; animation: blink 1s steps(2) infinite; }
  .pane.reason .cursor { background: var(--reason); }
  @keyframes blink { 50% { opacity: 0; } }

  .viz { padding: 10px 16px; border-top: 1px solid var(--border); background: var(--panel); max-height: 40vh; overflow: auto; }
  .viz img { max-width: 100%; border-radius: 6px; border: 1px solid var(--border); }
  .viz:empty { display: none; }

  /* image viewer with overlays */
  .draw-btn {
    margin-left: auto; margin-right: 6px; font-size: 11px; font: inherit; cursor: pointer;
    background: var(--accent); color: #fff; border: none; border-radius: 5px; padding: 3px 9px;
    text-transform: none; letter-spacing: 0;
  }
  .draw-btn:hover:not(:disabled) { background: var(--accent2); }
  .draw-btn:disabled { background: var(--border); cursor: not-allowed; opacity: .6; }
  .draw-btn.active { background: var(--ok); }
  .viewer-body { flex: 1; position: relative; overflow: hidden; background: #050608; cursor: grab; }
  .viewer-body.grabbing { cursor: grabbing; }
  .viewer-body img { position: absolute; top: 0; left: 0; max-width: none; max-height: none; transform-origin: 0 0; user-select: none; pointer-events: none; }
  #overlayCanvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; pointer-events: none; z-index: 2; }
  .viewer-empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-style: italic; pointer-events: none; }
  .viewer-empty:empty { display: none; }
  .viewer-hint { padding: 4px 12px; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); background: var(--panel); text-align: center; }

  .empty-hero { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); text-align: center; flex-direction: column; gap: 8px; }
  .empty-hero .emo { font-size: 40px; opacity: .5; }

  @media (max-width: 900px) {
    .wrap { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; min-height: 100vh; }
    .panes { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr 1.4fr; }
    .pane + .pane { border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="wrap">
  <section class="left">
    <header>
      <h1>Qwen3-VL <span style="color:var(--muted);font-weight:400">Thinking FP8</span></h1>
      <div class="sub">single-GPU &middot; drag an image, write a prompt</div>
    </header>
    <div class="left-body">
      <div class="field">
        <label>Model</label>
        <select id="model"></select>
      </div>
      <div class="field">
        <label>Skill</label>
        <select id="skill"></select>
      </div>

      <div class="field">
        <label>Image / video</label>
        <div class="drop" id="drop">
          <div class="big">⬆</div>
          <div>Drop or click to add</div>
        </div>
        <input type="file" id="fileInput" accept="image/*,video/*" multiple>
        <div class="previews" id="previews"></div>
      </div>

      <div class="field">
        <label>Prompt</label>
        <textarea id="prompt" placeholder="Describe the scene completely and precisely."></textarea>
      </div>

      <div class="field row">
        <div><label>Max tokens</label><input type="number" id="maxTokens" value="1024" min="1"></div>
        <div><label>Image side (0=full)</label><input type="number" id="imageSide" value="0" min="0"></div>
      </div>
    </div>
    <div class="left-footer">
      <button class="send" id="send">Send</button>
    </div>
  </section>

  <section class="right">
    <header>
      <span class="title">Output</span>
      <span class="status" id="status"><span class="dot"></span><span id="statusText">idle</span></span>
    </header>
    <div class="panes" id="panes">
      <div class="pane reason">
        <div class="pane-head">Thinking <span class="pill" id="reasonPill"></span></div>
        <div class="pane-body" id="reasoning" data-placeholder="Reasoning trace appears here."></div>
      </div>
      <div class="pane">
        <div class="pane-head">Answer <span class="pill" id="answerPill"></span></div>
        <div class="pane-body" id="answer" data-placeholder="Final answer appears here."></div>
      </div>
      <div class="pane viewer">
        <div class="pane-head">
          Image
          <span class="pill" id="zoomPill"></span>
          <button class="draw-btn" id="drawBtn" type="button" disabled>Draw overlays</button>
        </div>
        <div class="viewer-body" id="viewerBody">
          <canvas id="overlayCanvas"></canvas>
          <img id="viewerImg" alt="" draggable="false">
          <div class="viewer-empty" id="viewerEmpty">Load an image to view it here at full resolution.</div>
        </div>
        <div class="viewer-hint">scroll = zoom &middot; drag = pan &middot; double-click = reset</div>
      </div>
    </div>
    <div class="empty-hero" id="hero">
      <div class="emo">🧠</div>
      <div>Send a prompt to start generation.</div>
    </div>
    <div class="viz" id="viz"></div>
  </section>
</div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const state = { files: [], controller: null, sessionId: null, generating: false };

(async function init() {
  try {
    const [models, skills] = await Promise.all([
      fetch("/api/models").then(r => r.json()),
      fetch("/api/skills").then(r => r.json()),
    ]);
    models.models.forEach(m => $("model").add(new Option(`${m.id.toUpperCase()} FP8`, m.id)));
    $("skill").add(new Option("custom (free prompt)", "custom"));
    skills.skills.forEach(s => $("skill").add(new Option(s.label, s.key)));
    $("skill").addEventListener("change", () => {
      if ($("skill").value === "custom") return;
      const spec = skills.skills.find(s => s.key === $("skill").value);
      if (spec && spec.prompt) $("prompt").value = spec.prompt;
    });
  } catch (e) {
    setStatus("err", "failed to load models/skills");
  }
  try {
    const s = await fetch("/api/sessions", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ model_id: "2b" }) }).then(r => r.json());
    state.sessionId = s.id;
  } catch (e) { /* server will create one */ }
})();

const drop = $("drop"), fileInput = $("fileInput");
drop.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => addFiles(fileInput.files));
["dragenter","dragover"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("drag"); }));
["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("drag"); }));
drop.addEventListener("drop", e => { if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files); });

function addFiles(fileList) {
  for (const f of fileList) {
    if (!f.type.startsWith("image/") && !f.type.startsWith("video/")) continue;
    state.files.push({ file: f, url: URL.createObjectURL(f) });
  }
  renderPreviews();
}
function renderPreviews() {
  const box = $("previews"); box.innerHTML = "";
  state.files.forEach((item, i) => {
    const d = document.createElement("div"); d.className = "preview";
    const img = document.createElement("img");
    img.src = item.url; if (item.file.type.startsWith("video/")) img.style.opacity = .6;
    const x = document.createElement("span"); x.className = "x"; x.textContent = "✕";
    x.onclick = (e) => { e.stopPropagation(); URL.revokeObjectURL(item.url); state.files.splice(i,1); renderPreviews(); };
    d.append(img, x); box.append(d);
  });
  // Load the first image into the high-res viewer.
  const first = state.files.find(f => f.file.type.startsWith("image/"));
  if (first) loadViewer(first.url);
  else clearViewer();
}

// ---- high-res image viewer with zoom/pan + overlays ----
const viewer = {
  img: $("viewerImg"), canvas: $("overlayCanvas"), ctx: null,
  body: $("viewerBody"), empty: $("viewerEmpty"),
  zoom: 1, x: 0, y: 0, dragging: false, lastX: 0, lastY: 0,
  naturalW: 0, naturalH: 0,
};
viewer.ctx = viewer.canvas.getContext("2d");
state.overlays = null;

function loadViewer(src) {
  const img = viewer.img;
  img.onload = () => {
    viewer.naturalW = img.naturalWidth; viewer.naturalH = img.naturalHeight;
    viewer.canvas.width = viewer.naturalW; viewer.canvas.height = viewer.naturalH;
    viewer.empty.style.display = "none";
    fitViewer();
    drawOverlays();
  };
  img.src = src;
  state.overlays = null;
  $("drawBtn").disabled = true;
  $("drawBtn").classList.remove("active");
}
function clearViewer() {
  viewer.img.removeAttribute("src");
  viewer.ctx && viewer.ctx.clearRect(0, 0, viewer.canvas.width, viewer.canvas.height);
  viewer.empty.style.display = "";
  $("zoomPill").textContent = "";
  $("drawBtn").disabled = true;
}

function fitViewer() {
  const bw = viewer.body.clientWidth, bh = viewer.body.clientHeight;
  const iw = viewer.naturalW, ih = viewer.naturalH;
  if (!iw || !ih) return;
  viewer.zoom = Math.min(bw / iw, bh / ih, 1);
  viewer.x = Math.max(0, (bw - iw * viewer.zoom) / 2);
  viewer.y = Math.max(0, (bh - ih * viewer.zoom) / 2);
  applyTransform();
}
function applyTransform() {
  const t = `translate(${viewer.x}px,${viewer.y}px) scale(${viewer.zoom})`;
  viewer.img.style.transform = t;
  viewer.canvas.style.transform = t;
  $("zoomPill").textContent = Math.round(viewer.zoom * 100) + "%";
  drawOverlays();
}

// wheel zoom around cursor
viewer.body.addEventListener("wheel", e => {
  e.preventDefault();
  if (!viewer.naturalW) return;
  const rect = viewer.body.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const oldZoom = viewer.zoom;
  const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
  const newZoom = Math.max(0.05, Math.min(40, viewer.zoom * factor));
  // keep cursor point fixed: image point under cursor stays under cursor
  viewer.x = mx - (mx - viewer.x) * (newZoom / oldZoom);
  viewer.y = my - (my - viewer.y) * (newZoom / oldZoom);
  viewer.zoom = newZoom;
  applyTransform();
}, { passive: false });

// drag pan
viewer.body.addEventListener("mousedown", e => {
  if (!viewer.naturalW) return;
  viewer.dragging = true; viewer.lastX = e.clientX; viewer.lastY = e.clientY;
  viewer.body.classList.add("grabbing");
});
window.addEventListener("mousemove", e => {
  if (!viewer.dragging) return;
  viewer.x += e.clientX - viewer.lastX; viewer.y += e.clientY - viewer.lastY;
  viewer.lastX = e.clientX; viewer.lastY = e.clientY;
  applyTransform();
});
window.addEventListener("mouseup", () => { viewer.dragging = false; viewer.body.classList.remove("grabbing"); });
viewer.body.addEventListener("dblclick", fitViewer);

// ---- Draw overlays button ----
$("drawBtn").addEventListener("click", () => {
  const btn = $("drawBtn");
  if (btn.classList.contains("active")) {
    // toggle off: clear canvas
    viewer.ctx.clearRect(0, 0, viewer.canvas.width, viewer.canvas.height);
    btn.classList.remove("active");
  } else {
    drawOverlays(true);
    btn.classList.add("active");
  }
});

const OVERLAY_COLORS = ["#ff5d5d","#5dff8a","#5dc8ff","#ffd95d","#c25dff","#5dffe1","#ffa55d","#ff5dc4"];
function drawOverlays(force) {
  if (!viewer.ctx || !viewer.naturalW) return;
  viewer.ctx.clearRect(0, 0, viewer.canvas.width, viewer.canvas.height);
  if (!$("drawBtn").classList.contains("active") && !force) return;
  const ov = state.overlays;
  if (!ov || !ov.length) return;
  const W = viewer.naturalW, H = viewer.naturalH;
  viewer.ctx.lineWidth = Math.max(2, Math.round(W * 0.003));
  viewer.ctx.font = Math.round(W * 0.018) + "px sans-serif";
  viewer.ctx.textBaseline = "top";
  ov.forEach((item, i) => {
    const color = OVERLAY_COLORS[i % OVERLAY_COLORS.length];
    const pts = item.pts.map(p => [p[0] * W, p[1] * H]);
    viewer.ctx.strokeStyle = color; viewer.ctx.fillStyle = color;
    if (item.kind === "box" && pts.length >= 2) {
      const [x1,y1] = pts[0], [x2,y2] = pts[1];
      viewer.ctx.strokeRect(Math.min(x1,x2), Math.min(y1,y2), Math.abs(x2-x1), Math.abs(y2-y1));
    } else if (item.kind === "point" && pts.length >= 1) {
      const [x,y] = pts[0]; const r = Math.round(W * 0.008);
      viewer.ctx.beginPath(); viewer.ctx.arc(x, y, r, 0, 2*Math.PI); viewer.ctx.fill();
    } else if (item.kind === "poly" && pts.length >= 2) {
      viewer.ctx.beginPath();
      viewer.ctx.moveTo(pts[0][0], pts[0][1]);
      for (let k = 1; k < pts.length; k++) viewer.ctx.lineTo(pts[k][0], pts[k][1]);
      // draw all edges of the 3D wireframe (8 corners): connect each pair once
      const EDGES3D = [[0,1],[2,3],[4,5],[6,7],[0,2],[1,3],[4,6],[5,7],[0,4],[1,5],[2,6],[3,7]];
      viewer.ctx.stroke();
      viewer.ctx.beginPath();
      EDGES3D.forEach(([a,b]) => { if (pts[a] && pts[b]) { viewer.ctx.moveTo(pts[a][0],pts[a][1]); viewer.ctx.lineTo(pts[b][0],pts[b][1]); } });
      viewer.ctx.stroke();
    }
    // label
    if (item.label) {
      const [lx, ly] = pts[0];
      viewer.ctx.fillText(item.label, lx + 4, ly + 2);
    }
  });
}

$("send").addEventListener("click", () => state.generating ? stopGen() : startGen());

async function startGen() {
  const prompt = $("prompt").value.trim();
  if (!prompt && state.files.length === 0) return;
  const modelId = $("model").value || "2b";
  const skillKey = $("skill").value;
  const task = skillKey.startsWith("2d_grounding") ? "grounding_2d"
             : skillKey.startsWith("3d_grounding") ? "grounding_3d"
             : "custom";
  $("reasoning").textContent = ""; $("answer").textContent = "";
  $("reasonPill").textContent = ""; $("answerPill").textContent = "";
  $("viz").innerHTML = ""; $("hero").style.display = "none";
  // reset overlays / draw button for the new generation
  state.overlays = null;
  $("drawBtn").disabled = true;
  $("drawBtn").classList.remove("active");
  $("drawBtn").textContent = "Draw overlays";
  viewer.ctx && viewer.ctx.clearRect(0, 0, viewer.canvas.width, viewer.canvas.height);
  setGen(true); setStatus("live", "loading model…");

  const form = new FormData();
  form.append("session_id", state.sessionId || "");
  form.append("model_id", modelId);
  form.append("placement", "single");
  form.append("task", task);
  form.append("skill", $("skill").value || "");
  form.append("custom_prompt", prompt || "");
  form.append("max_new_tokens", $("maxTokens").value);
  form.append("max_image_side", $("imageSide").value);
  form.append("do_sample", "false");
  if (state.files.length) {
    try { await fetch(`/api/sessions/${state.sessionId}/reset`, { method: "POST" }); } catch(e) {}
    for (const item of state.files) form.append("files", item.file, item.file.name);
  }

  state.controller = new AbortController();
  try {
    const resp = await fetch("/api/chat", { method: "POST", body: form, signal: state.controller.signal });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `${resp.status} ${resp.statusText}`);
    }
    if (resp.headers.get("X-Session-Id")) state.sessionId = resp.headers.get("X-Session-Id");
    await consume(resp);
  } catch (e) {
    if (e.name !== "AbortError") { setStatus("err", e.message); $("answer").textContent = "Error: " + e.message; }
  } finally { setGen(false); }
}

async function consume(resp) {
  const reader = resp.body.getReader(); const dec = new TextDecoder();
  let buf = "";
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split("\n"); buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith("data: ")) continue;
      let ev; try { ev = JSON.parse(line.slice(6)); } catch { continue; }
      handle(ev);
    }
  }
}

function handle(ev) {
  switch (ev.type) {
    case "loading":
      setStatus("live", ev.state === "generating" ? "generating…" : "loading model…");
      break;
    case "prompt":
      setStatus("live", `prompt ${ev.prompt_tokens} tok`);
      break;
    case "token":
      if (ev.phase === "reasoning") append($("reasoning"), ev.text);
      else if (ev.phase === "answer") append($("answer"), ev.text);
      break;
    case "stats_live":
      $("reasonPill").textContent = ev.generated_tokens ? `${ev.generated_tokens} tok` : "";
      $("answerPill").textContent = ev.tokens_per_second ? `${ev.tokens_per_second} tok/s` : "";
      break;
    case "snapshot":
      if (ev.reasoning) $("reasoning").textContent = ev.reasoning;
      if (ev.answer) $("answer").textContent = ev.answer;
      break;
    case "done": {
      const r = ev.result || {};
      if (r.reasoning) $("reasoning").textContent = r.reasoning;
      if (r.answer) $("answer").textContent = r.answer;
      $("answerPill").textContent = r.tokens_per_second ? `${r.tokens_per_second.toFixed(1)} tok/s` : "";
      setStatus("idle", `${r.finish_reason || "done"} · ${r.generated_tokens || 0} tok`);
      if (ev.structured && ev.structured.value) showStructured(ev.structured);
      // overlays from coordinate skills → enable the Draw button
      const ov = ev.structured && ev.structured.overlays;
      if (Array.isArray(ov) && ov.length) {
        state.overlays = ov;
        $("drawBtn").disabled = false;
        $("drawBtn").classList.remove("active");
        $("drawBtn").textContent = `Draw overlays (${ov.length})`;
      } else {
        state.overlays = null;
        $("drawBtn").disabled = true;
        $("drawBtn").textContent = "Draw overlays";
      }
      break;
    }
    case "error":
      setStatus("err", ev.message || "error");
      $("answer").textContent = "Error: " + (ev.message || "unknown");
      break;
  }
}

function append(el, text) {
  const cur = el.querySelector(".cursor");
  if (cur) cur.remove();
  el.append(document.createTextNode(text));
  const c = document.createElement("span"); c.className = "cursor"; el.append(c);
  el.scrollTop = el.scrollHeight;
}

function showStructured(s) {
  $("viz").innerHTML = "<pre style='margin:0;font:12px/1.4 var(--mono);color:var(--muted);white-space:pre-wrap'>" +
    JSON.stringify(s.value, null, 2).replace(/</g,"&lt;") + "</pre>";
}

function setGen(on) {
  state.generating = on;
  const b = $("send");
  b.textContent = on ? "Stop" : "Send";
  b.classList.toggle("stop", on);
  if (!on) document.querySelectorAll(".cursor").forEach(c => c.remove());
}
function stopGen() { state.controller?.abort(); }
function setStatus(cls, txt) {
  const s = $("status"); s.className = "status" + (cls === "idle" ? "" : " " + cls);
  $("statusText").textContent = txt;
}
</script>
</body>
</html>
